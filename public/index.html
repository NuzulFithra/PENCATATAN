<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatatan Pengeluaran</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo">💰 Pencatatan Pengeluaran</div>
            <div class="nav-links">
                <a href="#dashboard" class="nav-link active">Dashboard</a>
                <a href="#transactions" class="nav-link">Transaksi</a>
                <a href="#export" class="nav-link">Export</a>
            </div>
        </nav>

        <!-- Dashboard Section -->
        <section id="dashboard" class="section">
            <h2>Dashboard</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Hari Ini</div>
                    <div class="stat-value" id="todayTotal">Rp 0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Bulan Ini</div>
                    <div class="stat-value" id="monthTotal">Rp 0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Tahun Ini</div>
                    <div class="stat-value" id="yearTotal">Rp 0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Transaksi</div>
                    <div class="stat-value" id="totalTransactions">0</div>
                </div>
            </div>
        </section>

        <!-- Add Expense Section -->
        <section id="add-expense" class="section">
            <h2>Tambah Pengeluaran</h2>
            <form id="expenseForm" class="form">
                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>Merchant</label>
                    <input type="text" id="merchant" placeholder="Toko/Restoran" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="category" required>
                        <option>Makanan</option>
                        <option>Transport</option>
                        <option>Hiburan</option>
                        <option>Utilities</option>
                        <option>Lainnya</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nominal</label>
                    <input type="number" id="amount" placeholder="Rp" required>
                </div>
                <div class="form-group">
                    <label>Metode Pembayaran</label>
                    <select id="method" required>
                        <option>Cash</option>
                        <option>Card</option>
                        <option>Transfer</option>
                        <option>E-Wallet</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Simpan</button>
            </form>
        </section>

        <!-- Transactions Section -->
        <section id="transactions" class="section">
            <h2>Daftar Pengeluaran</h2>
            <div class="search-box">
                <input type="text" id="search" placeholder="Cari merchant...">
            </div>
            <table id="expenseTable" class="table">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Merchant</th>
                        <th>Kategori</th>
                        <th>Nominal</th>
                        <th>Metode</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </section>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
